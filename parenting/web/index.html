<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parenting Strategy</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="custom.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Parenting Strategy',
      basePath: '..',
      homepage: 'parenting_strategy.md',
      loadSidebar: 'web/_sidebar.md',
      loadNavbar: false,
      subMaxLevel: 0,
      plugins: [
        function(hook) {
          hook.doneEach(function() {
            window.scrollTo(0, 0);
            // Open all external links in a new tab
            document.querySelectorAll('.content a[href^="http"]').forEach(function(a) {
              a.setAttribute('target', '_blank');
              a.setAttribute('rel', 'noopener noreferrer');
            });
          });
          hook.ready(function() {
            document.querySelector('.sidebar').addEventListener('click', function(e) {
              if (e.target.closest('a')) window.scrollTo(0, 0);
            });
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
</body>
</html>
